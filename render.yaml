services:
  - type: web
    name: nedvig-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nedvig-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://smartmoneymoscow-cell.github.io,http://localhost:3000"
      - key: ES_URL
        value: ""
      - key: REDIS_URL
        value: ""
    healthCheckPath: /api/health

databases:
  - name: nedvig-db
    plan: free
    databaseName: realty_db
    user: realty
