<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Realty AI — Умный поиск недвижимости</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface-hover: #f8f9fb;
  --border: #e4e7ec;
  --border-light: #f0f2f5;
  --text: #1a1d23;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --primary-dark: #1d4ed8;
  --accent: #0ea5e9;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --gradient: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* ═══ LAYOUT ═══ */
.app { display: flex; height: 100vh; }

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: 260px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 24px 20px 20px; border-bottom: 1px solid var(--border);
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 20px; font-weight: 800; color: var(--text);
  text-decoration: none;
}
.logo-icon {
  width: 36px; height: 36px; background: var(--gradient);
  border-radius: 10px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; color: white;
}
.logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 400; }

.sidebar nav { flex: 1; padding: 12px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; font-weight: 500;
  color: var(--text-secondary); transition: all 0.15s;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface-hover); color: var(--text); }
.nav-item.active {
  background: var(--primary-light); color: var(--primary); font-weight: 600;
}
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.nav-badge {
  margin-left: auto; background: var(--border-light);
  color: var(--text-muted); font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
}
.nav-item.active .nav-badge { background: #dbeafe; color: var(--primary); }

.sidebar-footer {
  padding: 16px 20px; border-top: 1px solid var(--border);
}
.status {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-muted);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success); animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ═══ MAIN ═══ */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ═══ CHAT ═══ */
.chat-header {
  padding: 16px 24px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.chat-header h2 { font-size: 16px; font-weight: 600; }
.chat-header .online {
  font-size: 12px; color: var(--success);
  display: flex; align-items: center; gap: 4px;
}
.chat-header .online::before {
  content: ''; width: 6px; height: 6px;
  border-radius: 50%; background: var(--success);
}

.chat-messages {
  flex: 1; overflow-y: auto; padding: 24px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}

.msg { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.agent { align-self: flex-start; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.msg.user .msg-avatar { background: var(--primary-light); }
.msg.agent .msg-avatar { background: #f0fdf4; }

.msg-bubble {
  padding: 12px 16px; border-radius: 16px;
  font-size: 14px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
}
.msg.user .msg-bubble {
  background: var(--primary); color: white;
  border-bottom-right-radius: 4px;
}
.msg.agent .msg-bubble {
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow-sm);
}
.msg-bubble strong { font-weight: 600; }
.msg.user .msg-bubble strong { color: white; }
.msg-time {
  font-size: 11px; color: var(--text-muted);
  margin-top: 4px; padding: 0 4px;
}
.msg.user .msg-time { text-align: right; }

.typing {
  display: flex; gap: 4px; padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing span {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-muted); animation: bounce 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* ═══ INPUT ═══ */
.chat-input-area {
  padding: 16px 24px; background: var(--surface);
  border-top: 1px solid var(--border);
}
.input-wrapper {
  display: flex; gap: 8px; max-width: 800px; margin: 0 auto;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 16px; padding: 6px 6px 6px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-wrapper:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
.input-wrapper input {
  flex: 1; border: none; background: none;
  font-size: 14px; outline: none; color: var(--text);
  font-family: inherit;
}
.input-wrapper input::placeholder { color: var(--text-muted); }
.send-btn {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--gradient); border: none;
  color: white; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, box-shadow 0.15s;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
.send-btn:active { transform: scale(0.95); }

.suggestions {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 10px; max-width: 800px; margin-left: auto; margin-right: auto;
}
.sug-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 14px;
  font-size: 12px; cursor: pointer; color: var(--text-secondary);
  font-family: inherit; transition: all 0.15s;
}
.sug-btn:hover {
  border-color: var(--primary); color: var(--primary);
  background: var(--primary-light);
}

/* ═══ LISTINGS ═══ */
.listings-view { flex: 1; overflow-y: auto; padding: 24px; }
.listings-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.listings-toolbar h2 { font-size: 18px; font-weight: 700; }
.listings-toolbar .count {
  font-size: 14px; color: var(--text-muted); font-weight: 400;
}

.filters {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.filter-select {
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  padding: 8px 12px; font-size: 13px; background: var(--surface);
  font-family: inherit; color: var(--text); cursor: pointer;
  transition: border-color 0.15s;
}
.filter-select:hover { border-color: var(--primary); }
.filter-select:focus { border-color: var(--primary); outline: none; }

.listings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.listing-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  transition: all 0.2s; cursor: pointer;
  text-decoration: none; color: inherit; display: block;
}
.listing-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
  border-color: transparent;
}

.card-image {
  height: 180px; background: linear-gradient(135deg, #e0e7ff, #dbeafe);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; position: relative; overflow: hidden;
}
.card-image::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(transparent, rgba(0,0,0,0.03));
}
.card-source {
  position: absolute; top: 12px; right: 12px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
  padding: 4px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 600; color: var(--text-secondary);
}
.card-deal {
  position: absolute; top: 12px; left: 12px;
  padding: 4px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 600; color: white;
}
.card-deal.sale { background: var(--success); }
.card-deal.rent { background: var(--accent); }

.card-body { padding: 16px; }
.card-price {
  font-size: 22px; font-weight: 800; color: var(--text);
  letter-spacing: -0.5px;
}
.card-price .currency {
  font-size: 14px; font-weight: 500; color: var(--text-muted);
}
.card-price .period {
  font-size: 13px; font-weight: 400; color: var(--text-muted);
}

.card-type {
  font-size: 12px; color: var(--text-muted); margin-top: 4px;
}

.card-specs {
  display: flex; gap: 12px; margin-top: 10px;
  font-size: 13px; color: var(--text-secondary);
}
.card-spec {
  display: flex; align-items: center; gap: 4px;
}
.card-spec .icon { font-size: 14px; }

.card-address {
  font-size: 13px; color: var(--text-secondary);
  margin-top: 10px; display: flex; align-items: flex-start; gap: 6px;
  line-height: 1.4;
}
.card-address .pin { flex-shrink: 0; }

.card-desc {
  font-size: 12px; color: var(--text-muted); margin-top: 8px;
  line-height: 1.4; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ═══ ANALYTICS ═══ */
.analytics-view { flex: 1; overflow-y: auto; padding: 24px; }
.analytics-header {
  margin-bottom: 24px;
}
.analytics-header h2 { font-size: 20px; font-weight: 700; }
.analytics-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px; margin-bottom: 24px;
}

.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  transition: all 0.2s;
}
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-label {
  font-size: 12px; font-weight: 500;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 8px;
}
.stat-value {
  font-size: 28px; font-weight: 800; color: var(--text);
  letter-spacing: -1px;
}
.stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.stat-bar {
  height: 4px; background: var(--border-light);
  border-radius: 2px; margin-top: 12px; overflow: hidden;
}
.stat-bar .fill {
  height: 100%; border-radius: 2px;
  background: var(--gradient);
}

.stat-card.highlight {
  background: var(--gradient); border: none;
}
.stat-card.highlight .stat-label { color: rgba(255,255,255,0.7); }
.stat-card.highlight .stat-value { color: white; }
.stat-card.highlight .stat-sub { color: rgba(255,255,255,0.6); }

.cities-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.city-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  transition: all 0.2s;
}
.city-card:hover { box-shadow: var(--shadow-md); }
.city-name {
  font-size: 16px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.city-name .emoji { font-size: 20px; }
.city-stats { display: flex; flex-direction: column; gap: 8px; }
.city-stat {
  display: flex; justify-content: space-between;
  font-size: 13px;
}
.city-stat .label { color: var(--text-muted); }
.city-stat .value { font-weight: 600; color: var(--text); }

/* ═══ EMPTY STATE ═══ */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state .icon { font-size: 56px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; }

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .sidebar { position: fixed; z-index: 100; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .msg { max-width: 90%; }
  .listings-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}

.hidden { display: none !important; }
</style>
</head>

{id:26,src:"avito",pt:"apartment",dt:"rent",pr:35000,ar:38,rm:1,fl:3,ft:5,ad:"ул. 8 Марта, 50",dt2:"Октябрьский",ct:"Екатеринбург",ds:"Однушка. Рядом ТЦ."},
{id:27,src:"cian",pt:"apartment",dt:"sale",pr:6500000,ar:60,rm:2,fl:6,ft:9,ad:"Красный пр., 25",dt2:"Центральный",ct:"Новосибирск",ds:"На Красном проспекте."},
{id:28,src:"domclick",pt:"apartment",dt:"sale",pr:9000000,ar:80,rm:3,fl:4,ft:10,ad:"ул. Ипподромская, 42",dt2:"Советский",ct:"Новосибирск",ds:"Трёшка. Рядом Академгородок."}
];

const PT={apartment:'Квартира',house:'Дом',commercial:'Коммерция',land:'Участок',studio:'Студия'};
const DT={sale:'Продажа',rent:'Аренда'};
const ICONS={apartment:'🏢',house:'🏡',studio:'🏠',commercial:'🏬',land:'🌾'};
let currentView='chat', filtered=[...D];

// ═══ NAV ═══
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const view = btn.dataset.view;
    switchView(view);
  });
});

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('view-chat').classList.toggle('hidden', view !== 'chat');
  document.getElementById('chat-messages').classList.toggle('hidden', view !== 'chat');
  document.getElementById('chat-input').classList.toggle('hidden', view !== 'chat');
  document.getElementById('view-listings').classList.toggle('hidden', view !== 'listings');
  document.getElementById('view-analytics').classList.toggle('hidden', view !== 'analytics');
  if (view === 'listings') renderListings(filtered);
  if (view === 'analytics') renderAnalytics();
}

// ═══ CHAT ═══
const chatEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('queryInput');

function addMsg(role, text, time) {
  const t = time || new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'user' ? '👤' : '🤖';
  const html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${html}</div>
      <div class="msg-time">${t}</div>
    </div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// Welcome message
addMsg('agent', '👋 Привет! Я AI-помощник по недвижимости.\n\nСпросите что угодно:\n• "двушка в Москве до 15 млн"\n• "сравни цены в Москве и Питере"\n• "аналитика по Краснодару"\n• "студия в аренду в СПБ"');

// Input handlers
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendQuery(); });
document.getElementById('sendBtn').addEventListener('click', sendQuery);

document.querySelectorAll('.sug-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    inputEl.value = btn.dataset.q;
    sendQuery();
  });
});

function sendQuery() {
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = '';
  addMsg('user', q);
  addTyping();

  setTimeout(() => {
    removeTyping();
    const response = processQuery(q);
    addMsg('agent', response.text);
    if (response.listings) {
      filtered = response.listings;
      document.getElementById('navCount').textContent = filtered.length;
    }
  }, 700);
}

function processQuery(q) {
  const l = q.toLowerCase();
  if (/сравн/.test(l)) return compareCities(l);
  if (/аналитик|статистик|средн/.test(l)) return getAnalytics(l);

  let f = {};
  if (/квартир|комнат/.test(l)) f.pt = 'apartment';
  if (/студи/.test(l)) { f.pt = 'studio'; f.rm = 0; }
  if (/дом|коттедж/.test(l)) f.pt = 'house';
  if (/коммерческ|офис/.test(l)) f.pt = 'commercial';
  if (/участок|земл/.test(l)) f.pt = 'land';
  if (/аренд|снять/.test(l)) f.dt = 'rent';
  if (/покуп|купить|прода/.test(l)) f.dt = 'sale';

  let m = l.match(/(\d)\s*[-–]?\s*комн/) || l.match(/(\d)\s*[-–]?\s*к\b/);
  if (m) f.rm = +m[1];
  if (/однушк/.test(l)) f.rm = 1;
  if (/двушк/.test(l)) f.rm = 2;
  if (/трёшк|трешк/.test(l)) f.rm = 3;

  m = l.match(/до\s+(\d+)\s*млн/);
  if (m) f.pm = +m[1] * 1e6;

  const cm = {москва:'Москва',мск:'Москва',питер:'Санкт-Петербург',спб:'Санкт-Петербург',
    краснодар:'Краснодар',сочи:'Сочи',екатеринбург:'Екатеринбург',новосибирск:'Новосибирск'};
  for (const [a, n] of Object.entries(cm)) {
    if (l.includes(a)) { f.ct = n; break; }
  }

  let r = D.filter(x => {
    if (f.ct && x.ct !== f.ct) return false;
    if (f.dt && x.dt !== f.dt) return false;
    if (f.pt && x.pt !== f.pt) return false;
    if (f.rm !== undefined && x.rm !== f.rm) return false;
    if (f.pm && x.pr > f.pm) return false;
    return true;
  });

  if (!r.length) return { text: '😕 Ничего не найдено. Попробуйте изменить параметры.', listings: [] };

  let s = [`🏠 Найдено **${r.length}** объявлений:\n`];
  r.slice(0, 8).forEach((x, i) => {
    const p = x.pr.toLocaleString('ru-RU') + ' ₽';
    const rm = x.rm === 0 ? 'Студия' : x.rm ? x.rm + 'к' : PT[x.pt];
    const a = x.ar ? ', ' + x.ar + 'м²' : '';
    const f2 = x.fl ? ', этаж ' + x.fl + '/' + x.ft : '';
    s.push(`**${i + 1}.** ${rm}${a}${f2} — **${p}**`);
    s.push(`   📍 ${x.ct}, ${x.ad}\n`);
  });
  if (r.length > 8) s.push(`...и ещё ${r.length - 8} объявлений.`);
  return { text: s.join('\n'), listings: r };
}

function compareCities(q) {
  const cm = {москва:'Москва',мск:'Москва',питер:'Санкт-Петербург',спб:'Санкт-Петербург',краснодар:'Краснодар',сочи:'Сочи'};
  let c = [];
  for (const [a, n] of Object.entries(cm)) if (q.includes(a) && !c.includes(n)) c.push(n);
  if (c.length < 2) return { text: '📊 Укажите два города: "сравни цены в Москве и Питере"', listings: [] };
  let s = ['📊 **Сравнение:**\n'];
  c.slice(0, 2).forEach(city => {
    const cl = D.filter(x => x.ct === city);
    const sl = cl.filter(x => x.dt === 'sale' && (x.pt === 'apartment' || x.pt === 'studio'));
    const avg = sl.length ? sl.reduce((v, x) => v + x.pr, 0) / sl.length : 0;
    const m2 = sl.length ? sl.reduce((v, x) => v + (x.ar ? x.pr / x.ar : 0), 0) / sl.length : 0;
    s.push(`**${city}** — ${cl.length} объявлений`);
    s.push(`  Продажа: ср. ${Math.round(avg).toLocaleString('ru-RU')} ₽ (${Math.round(m2).toLocaleString('ru-RU')} ₽/м²)\n`);
  });
  return { text: s.join('\n'), listings: [] };
}

function getAnalytics(q) {
  const cm = {москва:'Москва',мск:'Москва',питер:'Санкт-Петербург',спб:'Санкт-Петербург',краснодар:'Краснодар',сочи:'Сочи'};
  let city = null;
  for (const [a, n] of Object.entries(cm)) if (q.includes(a)) { city = n; break; }
  const d = city ? D.filter(x => x.ct === city) : D;
  const sl = d.filter(x => x.dt === 'sale' && (x.pt === 'apartment' || x.pt === 'studio'));
  const rl = d.filter(x => x.dt === 'rent' && (x.pt === 'apartment' || x.pt === 'studio'));
  const avg = a => a.length ? a.reduce((v, x) => v + x.pr, 0) / a.length : 0;
  const m2 = a => { const v = a.filter(x => x.ar); return v.length ? v.reduce((s, x) => s + x.pr / x.ar, 0) / v.length : 0; };
  let s = [`📊 **Аналитика ${city || 'все города'}:**\n`];
  if (sl.length) {
    s.push(`**Продажа** (${sl.length} шт.)`);
    s.push(`  Средняя: ${Math.round(avg(sl)).toLocaleString('ru-RU')} ₽`);
    s.push(`  За м²: ${Math.round(m2(sl)).toLocaleString('ru-RU')} ₽`);
    s.push(`  Диапазон: ${Math.min(...sl.map(x => x.pr)).toLocaleString('ru-RU')} – ${Math.max(...sl.map(x => x.pr)).toLocaleString('ru-RU')} ₽\n`);
  }
  if (rl.length) {
    s.push(`**Аренда** (${rl.length} шт.)`);
    s.push(`  Средняя: ${Math.round(avg(rl)).toLocaleString('ru-RU')} ₽/мес`);
  }
  return { text: s.join('\n'), listings: [] };
}

// ═══ LISTINGS ═══
function renderListings(items) {
  const grid = document.getElementById('listingsGrid');
  document.getElementById('listCount').textContent = `(${items.length})`;

  if (!items.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🏠</div><h3>Нет объявлений</h3><p>Попробуйте изменить фильтры или запросить поиск у AI-ассистента</p></div>';
    return;
  }

  grid.innerHTML = items.map(x => {
    const price = x.pr.toLocaleString('ru-RU');
    const period = x.dt === 'rent' ? '<span class="period">/мес</span>' : '';
    const rooms = x.rm === 0 ? 'Студия' : x.rm ? x.rm + '-комн.' : PT[x.pt];
    const specs = [
      x.ar ? `<span class="card-spec"><span class="icon">📐</span>${x.ar} м²</span>` : '',
      x.fl ? `<span class="card-spec"><span class="icon">🏢</span>${x.fl}/${x.ft} этаж</span>` : '',
      x.rm !== null && x.rm !== undefined ? `<span class="card-spec"><span class="icon">🚪</span>${rooms}</span>` : '',
    ].filter(Boolean).join('');

    return `<a class="listing-card" href="#" onclick="return false">
      <div class="card-image">
        ${ICONS[x.pt] || '🏢'}
        <span class="card-source">${x.src}</span>
        <span class="card-deal ${x.dt}">${DT[x.dt]}</span>
      </div>
      <div class="card-body">
        <div class="card-price">${price} <span class="currency">₽</span>${period}</div>
        <div class="card-type">${PT[x.pt]}${x.dt2 ? ' • ' + x.dt2 : ''}</div>
        <div class="card-specs">${specs}</div>
        <div class="card-address"><span class="pin">📍</span>${x.ct}, ${x.ad}</div>
        ${x.ds ? `<div class="card-desc">${x.ds}</div>` : ''}
      </div>
    </a>`;
  }).join('');
}

// Filters
document.getElementById('fCity').addEventListener('change', applyFilters);
document.getElementById('fDeal').addEventListener('change', applyFilters);
document.getElementById('fRooms').addEventListener('change', applyFilters);

function applyFilters() {
  const c = document.getElementById('fCity').value;
  const d = document.getElementById('fDeal').value;
  const r = document.getElementById('fRooms').value;
  let f = D;
  if (c) f = f.filter(x => x.ct === c);
  if (d) f = f.filter(x => x.dt === d);
  if (r !== '') f = f.filter(x => x.rm === parseInt(r));
  filtered = f;
  renderListings(f);
}

// ═══ ANALYTICS ═══
function renderAnalytics() {
  const cities = ['Москва', 'Санкт-Петербург', 'Краснодар', 'Сочи', 'Екатеринбург', 'Новосибирск'];
  const sale = D.filter(x => x.dt === 'sale');
  const rent = D.filter(x => x.dt === 'rent');
  const avg = sale.length ? Math.round(sale.reduce((v, x) => v + x.pr, 0) / sale.length) : 0;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card highlight">
      <div class="stat-label">Всего объявлений</div>
      <div class="stat-value">${D.length}</div>
      <div class="stat-sub">${cities.length} городов • 3 источника</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Продажа</div>
      <div class="stat-value">${sale.length}</div>
      <div class="stat-sub">${Math.round(sale.length / D.length * 100)}% от общего</div>
      <div class="stat-bar"><div class="fill" style="width:${sale.length / D.length * 100}%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Аренда</div>
      <div class="stat-value">${rent.length}</div>
      <div class="stat-sub">${Math.round(rent.length / D.length * 100)}% от общего</div>
      <div class="stat-bar"><div class="fill" style="width:${rent.length / D.length * 100}%"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Средняя цена (продажа)</div>
      <div class="stat-value">${(avg / 1e6).toFixed(1)} млн</div>
      <div class="stat-sub">₽ по всем городам</div>
    </div>`;

  document.getElementById('citiesGrid').innerHTML = cities.map(city => {
    const cl = D.filter(x => x.ct === city);
    const s = cl.filter(x => x.dt === 'sale');
    const r = cl.filter(x => x.dt === 'rent');
    const a = s.length ? Math.round(s.reduce((v, x) => v + x.pr, 0) / s.length) : 0;
    const mx = cl.length ? Math.max(...cl.map(x => x.pr)) : 0;
    const m2 = s.length ? Math.round(s.reduce((v, x) => v + (x.ar ? x.pr / x.ar : 0), 0) / s.length) : 0;

    return `<div class="city-card">
      <div class="city-name"><span class="emoji">🏙️</span> ${city}</div>
      <div class="city-stats">
        <div class="city-stat"><span class="label">Всего</span><span class="value">${cl.length} шт.</span></div>
        <div class="city-stat"><span class="label">Продажа</span><span class="value">${s.length}</span></div>
        <div class="city-stat"><span class="label">Аренда</span><span class="value">${r.length}</span></div>
        <div class="city-stat"><span class="label">Ср. цена</span><span class="value">${a ? (a / 1e6).toFixed(1) + ' млн ₽' : '—'}</span></div>
        <div class="city-stat"><span class="label">За м²</span><span class="value">${m2 ? m2.toLocaleString('ru-RU') + ' ₽' : '—'}</span></div>
        <div class="city-stat"><span class="label">Макс.</span><span class="value">${mx ? (mx / 1e6).toFixed(1) + ' млн ₽' : '—'}</span></div>
      </div>
    </div>`;
  }).join('');
}

// Init
renderListings(D);
</script>
